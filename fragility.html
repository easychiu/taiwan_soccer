<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>脆弱度指標</title>
<style>
  body{margin:0;background:#0a0f14;color:#e6edf3;font-family:"Microsoft JhengHei",system-ui,sans-serif;
    display:flex;flex-direction:column;align-items:center;padding:16px;gap:12px}
  .card{width:100%;max-width:560px}
  h1{font-size:19px;margin:0 0 2px}
  .asof{font-size:12px;opacity:.6}
  .score{font-size:50px;font-weight:800;text-align:center;margin:8px 0 4px}
  .bar{height:16px;border-radius:8px;background:#1c2633;overflow:hidden}
  .fill{height:100%;border-radius:8px;transition:width .4s}
  .band{text-align:center;font-size:16px;margin:8px 0;font-weight:bold}
  table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
  td,th{padding:6px 4px;border-bottom:1px solid #1c2633;text-align:left;vertical-align:top}
  td.p{text-align:right;font-weight:bold;white-space:nowrap}
  .warn{font-size:12px;opacity:.78;line-height:1.7;margin-top:14px;border-top:1px solid #1c2633;padding-top:10px}
</style>
<div class="card">
  <h1>⚠️ Claude 融合脆弱度指標 <span id="tk"></span></h1>
  <div class="asof" id="asof">讀取中...</div>
  <div class="score" id="score">—</div>
  <div class="bar"><div class="fill" id="fill" style="width:0"></div></div>
  <div class="band" id="band"></div>
  <table id="tbl"><thead><tr><th>訊號</th><th>讀數</th><th class="p">分</th></tr></thead><tbody></tbody></table>
  <div class="warn" id="warn"></div>
</div>
<script>
fetch('fragility.json?'+Date.now()).then(r=>r.json()).then(d=>{
  document.getElementById('tk').textContent='· '+d.ticker;
  document.getElementById('asof').textContent='資料時間 '+d.asof+'（每週一自動更新）';
  document.getElementById('score').textContent=d.total+' / 10';
  const pct=Math.min(100,d.total*10);
  const col=d.total<3?'#3fb950':d.total<5?'#d2a106':d.total<7?'#e0824d':'#e5534b';
  const f=document.getElementById('fill'); f.style.width=pct+'%'; f.style.background=col;
  const b=document.getElementById('band'); b.textContent=d.band; b.style.color=col;
  const tb=document.querySelector('#tbl tbody');
  d.signals.forEach(s=>{ const tr=document.createElement('tr');
    tr.innerHTML='<td>'+s.name+'<br><span style="opacity:.5;font-size:11px">'+s.note+'</span></td>'+
                 '<td>'+s.reading+'</td><td class="p">'+s.pts.toFixed(1)+'</td>'; tb.appendChild(tr); });
  document.getElementById('warn').innerHTML='⚠️ 這是「狀態」不是「時點」。脆弱≠馬上爆,領先時間極不定(可能早數月~數年)。<br>執行法:分批回應、接受自己會早、機械照表,不預測哪天。<br>你的部位%/槓桿請自己加進總分。';
}).catch(()=>{document.getElementById('score').textContent='讀取失敗';document.getElementById('asof').textContent='fragility.json 還沒產生(等第一次 Action 跑完)';});
</script>
